<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlante delle Domande | Giuseppe Lo Iacono</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#050505;
  font-family:Arial,Helvetica,sans-serif;
}

.atlante{
  position:relative;
  width:100%;
  min-height:100vh;
  background:url("atlante-bg.png") center center/cover no-repeat;
}

.hotspot{
  position:absolute;
  border-radius:50%;
  transform:translate(-50%,-50%);
  text-indent:-9999px;
  transition:.25s;
}

.hotspot:hover{
  box-shadow:0 0 45px rgba(232,201,130,.75);
  background:rgba(232,201,130,.08);
}

.echo{left:50%;top:17%;width:17%;height:23%}
.libri{left:26%;top:31%;width:18%;height:24%}
.riflessioni{left:74%;top:31%;width:18%;height:24%}
.international{left:25%;top:62%;width:18%;height:24%}
.community{left:75%;top:62%;width:18%;height:24%}
.library{left:40%;top:81%;width:17%;height:22%}
.chisono{left:60%;top:81%;width:17%;height:22%}
.osservare{left:50%;top:49%;width:22%;height:30%}

.back{
  position:absolute;
  left:50%;
  bottom:28px;
  transform:translateX(-50%);
  color:#e8c982;
  text-decoration:none;
  font-weight:bold;
  background:rgba(0,0,0,.45);
  padding:12px 24px;
  border-radius:999px;
  border:1px solid rgba(232,201,130,.35);
}

.back:hover{
  background:#8b1e24;
  color:#fffaf3;
}

@media(max-width:700px){
  .atlante{
    min-height:100vh;
    background-size:cover;
    background-position:center;
  }

  .hotspot{
    width:26%!important;
    height:14%!important;
  }

  .echo{left:50%;top:18%}
  .libri{left:25%;top:32%}
  .riflessioni{left:75%;top:32%}
  .osservare{left:50%;top:49%;width:32%!important;height:20%!important}
  .international{left:25%;top:63%}
  .community{left:75%;top:63%}
  .library{left:40%;top:82%}
  .chisono{left:60%;top:82%}
}
</style>
</head>

<body>

<section class="atlante">

  <a class="hotspot echo" href="echo.html">ECHO</a>
  <a class="hotspot libri" href="libri.html">Libri</a>
  <a class="hotspot riflessioni" href="blog.html">Riflessioni</a>
  <a class="hotspot international" href="library.html">International</a>
  <a class="hotspot community" href="community.html">Community</a>
  <a class="hotspot library" href="library.html">Library</a>
  <a class="hotspot chisono" href="chi-sono.html">Chi sono</a>
  <a class="hotspot osservare" href="index.html">Osservare</a>

  <a class="back" href="index.html">← Torna alla Home</a>

</section>

</body>
</html>
